<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey</title>
    <style>
        body { background-color: #fff5f5; font-family: sans-serif; color: #4a4a4a; margin: 0; padding: 20px; }
        header { text-align: center; padding: 50px 0; }
        h1 { color: #ff748c; }
        .timeline { position: relative; max-width: 800px; margin: 0 auto; }
        .timeline::after { content: ''; position: absolute; width: 4px; background-color: #ffb3c1; top: 0; bottom: 0; left: 50%; margin-left: -2px; }
        .container { padding: 10px 40px; position: relative; width: 50%; box-sizing: border-box; }
        .container::after { content: '❤️'; position: absolute; width: 25px; height: 25px; right: -17px; background-color: #fff; top: 15px; border-radius: 50%; z-index: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .left { left: 0; }
        .right { left: 50%; }
        .right::after { left: -17px; }
        .content { padding: 20px; background-color: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .content h2 { font-size: 18px; color: #ff748c; margin-top: 10px; }
        .date { font-weight: bold; color: #ffb3c1; display: block; }
        img { width: 100%; border-radius: 10px; margin-bottom: 10px; display: block; }
        @media screen and (max-width: 600px) {
            .timeline::after { left: 31px; }
            .container { width: 100%; padding-left: 70px; padding-right: 25px; }
            .container::after { left: 15px; }
            .right { left: 0%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>our story</h1>
    </header>

    <div class="timeline">
        <div class="container left">
            <div class="content">
                <img src="cantikku.jpg">
                <span class="date">8 November 2025</span>
                <h2>bukan first meet sih tapi ini pertama kalinya aku ngefoto kamu di gramed xixi</h2>
                <p>aku inget banget inii senyummu cantikk bangett sayangg :)</p>
            </div>
        </div>

        <div class="container right">
            <div class="content">
				<img src="ngupil.jpg">
                <span class="date">14 November 2025</span>
                <h2>nonton pertama</h2>
                <p>ini kalo ga salah nonton lintrik sama temenku waktu itu ya</p>
				<p>Cantikk banget dedek meskipun ngupil</p>
            </div>
        </div>
    </div>

</body>
</html>
